<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1600" viewBox="0 0 900 1600">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#f4c95d"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .bg { fill: #15120d; }
      .panel { fill: #211b13; stroke: #5d4a2a; stroke-width: 2; }
      .gold { fill: #f4c95d; }
      .muted { fill: #b9a783; }
      .white { fill: #f8efd6; }
      .red { fill: #b64036; }
      .green { fill: #5fbf77; }
      .line { stroke: #f4c95d; stroke-width: 4; marker-end: url(#arrow); fill: none; }
      .note { fill: #2b2418; stroke: #f4c95d; stroke-width: 2; rx: 10; }
      .card { fill: #2a2218; stroke: #80663b; stroke-width: 2; rx: 12; }
      .lane { fill: #3a3021; stroke: #74603a; stroke-width: 2; rx: 10; }
    </style>
  </defs>

  <rect class="bg" width="900" height="1600"/>

  <rect x="70" y="50" width="760" height="1450" class="panel" rx="28"/>
  <text x="450" y="100" class="gold" font-size="30" text-anchor="middle">战斗界面指标说明</text>

  <rect x="100" y="135" width="700" height="90" fill="#241515" stroke="#6b302a" stroke-width="2" rx="14"/>
  <text x="125" y="168" class="muted" font-size="22">敌军：黄巾散兵</text>
  <rect x="125" y="185" width="360" height="18" fill="#4b1614" rx="9"/>
  <rect x="125" y="185" width="360" height="18" fill="#b64036" rx="9"/>
  <text x="505" y="203" class="white" font-size="26">24/24</text>

  <rect x="100" y="245" width="700" height="58" fill="#1b1812" stroke="#4d3f28" stroke-width="2" rx="12"/>
  <text x="128" y="282" class="white" font-size="23">第 1/12 拍</text>
  <text x="345" y="282" class="muted" font-size="23">无风</text>
  <text x="520" y="282" class="muted" font-size="23">手动军令</text>

  <rect x="100" y="330" width="700" height="520" fill="#181510" stroke="#6d5b38" stroke-width="2" rx="18"/>
  <text x="450" y="365" class="gold" font-size="24" text-anchor="middle">3D 三路军阵</text>
  <rect x="145" y="405" width="170" height="390" class="lane"/>
  <rect x="365" y="405" width="170" height="390" class="lane"/>
  <rect x="585" y="405" width="170" height="390" class="lane"/>
  <text x="230" y="440" class="white" font-size="28" text-anchor="middle">上路</text>
  <text x="450" y="440" class="white" font-size="28" text-anchor="middle">中路</text>
  <text x="670" y="440" class="white" font-size="28" text-anchor="middle">下路</text>
  <text x="230" y="515" class="red" font-size="34" text-anchor="middle">盾阵 3</text>
  <text x="450" y="515" class="muted" font-size="34" text-anchor="middle">按兵 —</text>
  <text x="670" y="515" class="muted" font-size="34" text-anchor="middle">按兵 —</text>
  <text x="230" y="760" class="white" font-size="42" text-anchor="middle">0</text>
  <text x="450" y="760" class="green" font-size="42" text-anchor="middle">+3</text>
  <text x="670" y="760" class="red" font-size="42" text-anchor="middle">-3</text>

  <rect x="100" y="885" width="700" height="75" fill="#17140f" stroke="#55442a" stroke-width="2" rx="14"/>
  <rect x="125" y="910" width="310" height="18" fill="#263523" rx="9"/>
  <rect x="125" y="910" width="310" height="18" fill="#5fbf77" rx="9"/>
  <text x="455" y="933" class="white" font-size="26">30/30</text>
  <circle cx="635" cy="922" r="30" fill="#5d421a" stroke="#f4c95d" stroke-width="2"/>
  <text x="635" y="932" class="gold" font-size="22" text-anchor="middle">谋 2/5</text>

  <rect x="100" y="990" width="700" height="225" fill="#15120d" stroke="#55442a" stroke-width="2" rx="18"/>
  <text x="125" y="1025" class="muted" font-size="22">你的手牌区：每拍会变化</text>
  <rect x="125" y="1050" width="125" height="135" class="card"/>
  <text x="143" y="1080" class="gold" font-size="24">1</text>
  <text x="188" y="1115" class="white" font-size="24" text-anchor="middle">弓手</text>
  <text x="188" y="1152" class="muted" font-size="18" text-anchor="middle">攻3 守0</text>
  <rect x="270" y="1050" width="125" height="135" class="card"/>
  <text x="288" y="1080" class="gold" font-size="24">1</text>
  <text x="333" y="1115" class="white" font-size="24" text-anchor="middle">长枪兵</text>
  <text x="333" y="1152" class="muted" font-size="18" text-anchor="middle">攻2 守2</text>
  <rect x="415" y="1050" width="125" height="135" class="card"/>
  <text x="433" y="1080" class="gold" font-size="24">2</text>
  <text x="478" y="1115" class="white" font-size="24" text-anchor="middle">轻骑</text>
  <text x="478" y="1152" class="muted" font-size="18" text-anchor="middle">攻4 守1</text>
  <rect x="560" y="1050" width="125" height="135" class="card"/>
  <text x="578" y="1080" class="gold" font-size="24">1</text>
  <text x="623" y="1115" class="white" font-size="24" text-anchor="middle">斥候</text>
  <text x="623" y="1152" class="muted" font-size="18" text-anchor="middle">抽1张</text>

  <rect x="100" y="1240" width="700" height="75" fill="#17140f" stroke="#55442a" stroke-width="2" rx="14"/>
  <text x="125" y="1287" class="muted" font-size="24">牌堆 7 · 弃牌 0</text>
  <rect x="560" y="1252" width="210" height="50" fill="#8a6324" stroke="#f4c95d" stroke-width="2" rx="12"/>
  <text x="665" y="1286" class="white" font-size="24" text-anchor="middle">下达军令</text>

  <rect x="575" y="125" width="250" height="95" class="note"/>
  <text x="595" y="158" class="gold" font-size="22">敌方主帐生命</text>
  <text x="595" y="190" class="white" font-size="20">24/24 = 当前/最大</text>
  <path class="line" d="M575 175 C540 175, 540 195, 520 195"/>

  <rect x="575" y="875" width="250" height="115" class="note"/>
  <text x="595" y="910" class="gold" font-size="22">我方主帐生命</text>
  <text x="595" y="942" class="white" font-size="20">30/30 = 当前/最大</text>
  <text x="595" y="970" class="white" font-size="20">归零就失败</text>
  <path class="line" d="M575 925 C520 925, 505 925, 465 925"/>

  <rect x="625" y="780" width="235" height="120" class="note"/>
  <text x="645" y="815" class="gold" font-size="22">军势刻度</text>
  <text x="645" y="847" class="white" font-size="20">首关 +6：打敌方 -10</text>
  <text x="645" y="875" class="white" font-size="20">首关 -6：我方 -10</text>
  <path class="line" d="M625 830 C590 795, 565 765, 520 760"/>

  <rect x="20" y="395" width="250" height="140" class="note"/>
  <text x="40" y="430" class="gold" font-size="22">敌方意图</text>
  <text x="40" y="462" class="white" font-size="20">下一拍会在哪路</text>
  <text x="40" y="490" class="white" font-size="20">出什么招、多少战力</text>
  <path class="line" d="M270 455 C305 475, 330 500, 220 510"/>

  <rect x="600" y="995" width="270" height="135" class="note"/>
  <text x="620" y="1030" class="gold" font-size="22">卡牌左上角数字</text>
  <text x="620" y="1062" class="white" font-size="20">费用，消耗“谋略”</text>
  <text x="620" y="1090" class="white" font-size="20">攻/守会转成战力</text>
  <path class="line" d="M600 1060 C555 1060, 520 1060, 440 1075"/>

  <rect x="45" y="885" width="245" height="120" class="note"/>
  <text x="65" y="920" class="gold" font-size="22">谋略</text>
  <text x="65" y="952" class="white" font-size="20">本拍可用费用</text>
  <text x="65" y="980" class="white" font-size="20">每拍结算后 +2</text>
  <path class="line" d="M290 940 C390 940, 540 930, 610 925"/>

  <rect x="80" y="1325" width="760" height="110" fill="#201a12" stroke="#80663b" stroke-width="2" rx="16"/>
  <text x="110" y="1362" class="gold" font-size="24">一句话玩法</text>
  <text x="110" y="1400" class="white" font-size="22">看敌方意图 → 用谋略出牌到三路 → 下达军令结算 → 首关把任一路推到 +6 完成破阵。</text>
</svg>
